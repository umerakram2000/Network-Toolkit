<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Network Engineer Toolkit</title>
  <meta name="description" content="Free tools for network engineers: subnet calculator, fiber loss calculator, dBm converter and more.">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Network Engineer Toolkit</h1>
  <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
</header>

<nav>
  <button onclick="showTool('subnet')">Subnet Calculator</button>
  <button onclick="showTool('dbm')">dBm Converter</button>
  <button onclick="showTool('fiber')">Fiber Loss</button>
</nav>

<main>

<!-- SUBNET -->
<section id="subnet" class="tool active">
  <h2>Subnet Calculator</h2>

  <input id="ip" placeholder="192.168.1.0">
  <input id="prefix" type="number" placeholder="Prefix (e.g. 24)">

  <button onclick="calcSubnet()">Calculate</button>

  <div id="subnetResult"></div>
</section>

<!-- DBM -->
<section id="dbm" class="tool">
  <h2>dBm ↔ mW Converter</h2>

  <input id="dbmInput" placeholder="Enter dBm">

  <button onclick="convertDbm()">Convert</button>

  <div id="dbmResult"></div>
</section>

<!-- FIBER -->
<section id="fiber" class="tool">
  <h2>Fiber Loss Calculator</h2>

  <input id="distance" placeholder="Distance (km)">
  <input id="lossPerKm" placeholder="Loss per km (e.g. 0.35)">
  <input id="spliceLoss" placeholder="Splice/Connector loss (dB)">

  <button onclick="calcFiber()">Calculate</button>

  <div id="fiberResult"></div>
</section>

</main>

<footer>
  <p>© 2026 Network Engineer Toolkit</p>
</footer>

<script src="script.js"></script>

</body>
</html>
