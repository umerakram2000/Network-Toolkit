<section id="bmi" class="tool">
  <h2>BMI Calculator (Body Mass Index)</h2>

  <p>Enter your weight and height to check if you are underweight, normal, or overweight.</p>

  <input id="weight" type="number" placeholder="Weight (kg)">
  <input id="height" type="number" placeholder="Height (cm)">

  <button onclick="calcBMI()">Calculate BMI</button>

  <div id="bmiResult"></div>
</section>
